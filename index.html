<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniPop VR – Entdecke deine Möglichkeiten</title>
  <meta name="description" content="UniPop VR-Hub: Wähle eine Kategorie und tauche in ein 360°-Erlebnis ein." />

  <!-- A-Frame WebXR Framework -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- UniPop App-Logik -->
  <script src="js/app.js" defer></script>

  <style>
    html, body { margin: 0; padding: 0; }
    .a-enter-vr-button { background-color: #7C3AED !important; }

    /* 2D-Hinweis auf Desktop/Smartphone */
    #flat-hint {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #fff;
      background: rgba(20, 12, 40, 0.75);
      padding: 8px 16px;
      border-radius: 20px;
      z-index: 999;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

  <div id="flat-hint">Meta Quest: Brille aufsetzen und „VR" antippen · Desktop: klicken &amp; ziehen</div>

  <a-scene
    renderer="antialias: true; colorManagement: true; foveationLevel: 1"
    background="color: #0b0820"
    loading-screen="dotsColor: #7C3AED; backgroundColor: #0b0820"
    unipop-hub>

    <!-- ===================== ASSETS ===================== -->
    <a-assets timeout="10000">
      <!-- Das 360°-Video wird zur Laufzeit per JS geladen (src wird dynamisch gesetzt),
           damit nicht alle Videos gleichzeitig geladen werden. -->
      <video id="video360"
             playsinline
             webkit-playsinline
             crossorigin="anonymous"
             preload="none"></video>
    </a-assets>

    <!-- ===================== 360°-VIDEOSPHÄRE (anfangs unsichtbar) ===================== -->
    <a-videosphere id="videosphere" src="#video360" visible="false" rotation="0 -90 0"></a-videosphere>

    <!-- ===================== HUB (wird von js/app.js befüllt) ===================== -->
    <a-entity id="hub">

      <!-- Verlaufs-Himmel (Sonnenuntergang wie im Mockup) -->
      <a-sky id="gradient-sky" material="shader: sunset-gradient" radius="80"></a-sky>

      <!-- Kuppel / Decke -->
      <a-entity geometry="primitive: sphere; radius: 9; thetaLength: 60"
                material="color: #16101f; side: back; metalness: 0.3; roughness: 0.8"
                position="0 4.2 0"
                scale="1 0.55 1"></a-entity>

      <!-- Leuchtring an der Decke -->
      <a-torus position="0 4.6 0" rotation="90 0 0" radius="2.6" radius-tubular="0.025"
               material="color: #f5e9d0; emissive: #f5e9d0; emissiveIntensity: 1"></a-torus>

      <!-- Boden -->
      <a-circle rotation="-90 0 0" radius="9" position="0 0 0"
                material="color: #1b1326; metalness: 0.2; roughness: 0.9"></a-circle>

      <!-- Lila Plattform mit Leuchtring -->
      <a-cylinder position="0 0.02 -2.5" radius="2.6" height="0.04"
                  material="color: #3b2a5e; roughness: 0.7"></a-cylinder>
      <a-torus position="0 0.05 -2.5" rotation="90 0 0" radius="2.6" radius-tubular="0.03"
               material="color: #c9a86a; emissive: #e8c987; emissiveIntensity: 0.9"></a-torus>
      <a-entity text="value: UniPop; align: center; color: #cfc6e8; width: 8"
                position="0 0.07 -2.5" rotation="-90 0 0"></a-entity>

      <!-- Willkommens-Panel oben -->
      <a-entity id="welcome" position="0 3.05 -4.5">
        <a-plane width="4.6" height="1.25" material="color: #14101e; opacity: 0.85" radius="0.1"></a-plane>
        <a-entity text="value: WILLKOMMEN BEI UNIPOP; align: center; color: #a78bfa; width: 4.6; wrapCount: 40"
                  position="0 0.42 0.01"></a-entity>
        <a-entity text="value: Entdecke deine Möglichkeiten; align: center; color: #ffffff; width: 7; wrapCount: 32"
                  position="0 0.08 0.01"></a-entity>
        <a-entity text="value: Wähle ein Thema, das dich interessiert; align: center; color: #d8d4e8; width: 4; wrapCount: 44"
                  position="0 -0.32 0.01"></a-entity>
      </a-entity>

      <!-- Info-Panel mit Start-Hinweis -->
      <a-entity position="0 0.95 -3.4">
        <a-plane width="2.4" height="0.7" material="color: #14101e; opacity: 0.85"></a-plane>
        <a-entity text="value: Tauche ein in über 1000 Kurse\nin ganz Luxemburg; align: center; color: #ffffff; width: 3.2; wrapCount: 38"
                  position="0 0.12 0.01"></a-entity>
        <a-entity text="value: Seit 1976 für lebenslanges Lernen; align: center; color: #b9b2cc; width: 2.4; wrapCount: 44"
                  position="0 -0.2 0.01"></a-entity>
      </a-entity>

      <!-- Die 5 Kategorie-Karten werden hier per JS eingefügt -->
      <a-entity id="cards"></a-entity>

      <!-- Licht -->
      <a-entity light="type: ambient; color: #b9aee0; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; color: #ffd9a0; intensity: 0.8" position="-3 5 2"></a-entity>
    </a-entity>

    <!-- ===================== VIDEO-UI (Zurück-Button + Lade-Anzeige) ===================== -->
    <a-entity id="video-ui" visible="false">
      <a-entity id="back-button" class="clickable"
                geometry="primitive: plane; width: 1.4; height: 0.45"
                material="color: #7C3AED; opacity: 0.92"
                position="0 0.9 -2.2"
                text="value: ← Zurück zum Hub; align: center; color: #ffffff; width: 2.6; wrapCount: 22"></a-entity>
    </a-entity>

    <a-entity id="loader" visible="false" position="0 1.6 -2.5"
              text="value: Video wird geladen …; align: center; color: #ffffff; width: 3"></a-entity>

    <a-entity id="error-panel" visible="false" position="0 1.3 -2.5">
      <a-plane width="2.8" height="0.8" material="color: #3a1020; opacity: 0.92"></a-plane>
      <a-entity id="error-text"
                text="value: Video nicht gefunden.; align: center; color: #ffb4c0; width: 2.6; wrapCount: 40"
                position="0 0 0.01"></a-entity>
    </a-entity>

    <!-- ===================== KAMERA + CONTROLLER ===================== -->
    <a-entity id="rig" position="0 0 0.6">
      <a-camera look-controls="pointerLockEnabled: false" wasd-controls-enabled="false">
        <!-- Maus-Cursor für Desktop-Tests -->
        <a-entity cursor="rayOrigin: mouse; fuse: false"
                  raycaster="objects: .clickable; far: 30"></a-entity>
      </a-camera>

      <!-- Meta Quest 3 Controller mit Laser -->
      <a-entity laser-controls="hand: left"
                raycaster="objects: .clickable; far: 30; lineColor: #a78bfa; lineOpacity: 0.85"></a-entity>
      <a-entity laser-controls="hand: right"
                raycaster="objects: .clickable; far: 30; lineColor: #a78bfa; lineOpacity: 0.85"></a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
