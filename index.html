<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UniPop VR Hub 360</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
  <a-scene
    vr-mode-ui="enabled: true"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    background="color: #020617"
  >

    <a-assets timeout="30000">
      <img id="hub-bg" src="assets/unipop-hub-bg.png" />

      <video id="video-langues" src="videos/langues.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-ia" src="videos/ia.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-creativite" src="videos/creativite.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-bienetre" src="videos/bien-etre.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-cuisine" src="videos/cuisine.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
    </a-assets>

    <a-sky id="videoSky" color="#020617"></a-sky>

    <a-entity id="cameraRig">
      <a-camera id="camera" position="0 1.6 0" look-controls wasd-controls="enabled: false">
        <a-cursor
          id="cursor"
          fuse="true"
          fuse-timeout="1000"
          color="#ffffff"
          raycaster="objects: .clickable"
          geometry="primitive: ring; radiusInner: 0.011; radiusOuter: 0.022"
          material="color: #ffffff; shader: flat"
        ></a-cursor>
      </a-camera>
    </a-entity>

    <a-entity id="hubRoot" position="0 1.6 -5.4">

      <a-plane
        id="hubImage"
        src="#hub-bg"
        width="9.8"
        height="5.5125"
        position="0 0 0"
        material="shader: flat; transparent: false"
      ></a-plane>

      <a-entity id="hotspot-langues" class="clickable hotspot" data-video="video-langues" position="-3.35 -0.92 0.06">
        <a-circle radius="0.72" material="color: #00aaff; opacity: 0.05; transparent: true; shader: flat"></a-circle>
      </a-entity>

      <a-entity id="hotspot-ia" class="clickable hotspot" data-video="video-ia" position="-1.66 -0.86 0.06">
        <a-circle radius="0.70" material="color: #b100ff; opacity: 0.05; transparent: true; shader: flat"></a-circle>
      </a-entity>

      <a-entity id="hotspot-creativite" class="clickable hotspot" data-video="video-creativite" position="0.02 -0.82 0.06">
        <a-circle radius="0.72" material="color: #ff2bbf; opacity: 0.05; transparent: true; shader: flat"></a-circle>
      </a-entity>

      <a-entity id="hotspot-bienetre" class="clickable hotspot" data-video="video-bienetre" position="1.73 -0.84 0.06">
        <a-circle radius="0.70" material="color: #00ffd0; opacity: 0.05; transparent: true; shader: flat"></a-circle>
      </a-entity>

      <a-entity id="hotspot-cuisine" class="clickable hotspot" data-video="video-cuisine" position="3.42 -0.86 0.06">
        <a-circle radius="0.70" material="color: #ff8a00; opacity: 0.05; transparent: true; shader: flat"></a-circle>
      </a-entity>

      <a-entity id="debugNames" visible="false">
        <a-text value="LANGUES" position="-3.35 -1.65 0.1" align="center" color="#ffffff" width="2"></a-text>
        <a-text value="IA" position="-1.66 -1.65 0.1" align="center" color="#ffffff" width="2"></a-text>
        <a-text value="CREATIVITE" position="0.02 -1.65 0.1" align="center" color="#ffffff" width="2"></a-text>
        <a-text value="BIEN-ETRE" position="1.73 -1.65 0.1" align="center" color="#ffffff" width="2"></a-text>
        <a-text value="CUISINE" position="3.42 -1.65 0.1" align="center" color="#ffffff" width="2"></a-text>
      </a-entity>

    </a-entity>

    <a-entity id="videoUI" visible="false">
      <a-entity id="backButton" class="clickable" position="0 2.9 -3">
        <a-plane
          width="2.55"
          height="0.58"
          color="#000814"
          opacity="0.86"
          material="shader: flat; transparent: true"
        ></a-plane>

        <a-plane
          width="2.62"
          height="0.65"
          position="0 0 -0.01"
          color="#38bdf8"
          opacity="0.18"
          material="shader: flat; transparent: true"
        ></a-plane>

        <a-text
          value="Retour au Hub"
          align="center"
          position="0 0 0.04"
          color="#ffffff"
          width="4"
        ></a-text>
      </a-entity>
    </a-entity>

  </a-scene>

  <script src="app.js"></script>
</body>
</html>
