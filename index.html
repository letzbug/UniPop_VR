<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UniPop VR Hub</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
  <a-scene
    vr-mode-ui="enabled: true"
    renderer="antialias: true; colorManagement: true"
    background="color: #05070d"
  >

    <a-assets timeout="30000">
      <img id="hub-bg" src="assets/unipop-hub.png" />

      <video id="video-langues" src="videos/langues.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-informatique" src="videos/informatique.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-bienetre" src="videos/bien-etre.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-creativite" src="videos/creativite.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-developpement" src="videos/developpement-personnel.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-cuisine" src="videos/cuisine.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-culture" src="videos/culture.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
    </a-assets>

    <a-sky id="videoSky" color="#05070d"></a-sky>

    <a-camera position="0 1.6 0" look-controls wasd-controls="enabled: false">
      <a-cursor
        id="cursor"
        fuse="true"
        fuse-timeout="900"
        color="#ffffff"
        raycaster="objects: .clickable"
        geometry="primitive: ring; radiusInner: 0.011; radiusOuter: 0.024"
        material="color: #ffffff; shader: flat"
      ></a-cursor>
    </a-camera>

    <a-entity id="hub" position="0 1.6 -4.2">

      <a-plane
        id="hubImage"
        src="#hub-bg"
        width="8.8"
        height="7.042511"
        position="0 0 0"
        material="shader: flat"
      ></a-plane>

      <!-- Unsichtbare Klickzonen exakt auf den Karten -->
      <a-plane class="clickable hotspot" data-video="video-langues" position="-2.72 0.62 0.05" width="1.18" height="1.52" material="opacity: 0; transparent: true"></a-plane>
      <a-plane class="clickable hotspot" data-video="video-informatique" position="-1.37 0.77 0.05" width="1.18" height="1.50" material="opacity: 0; transparent: true"></a-plane>
      <a-plane class="clickable hotspot" data-video="video-bienetre" position="0.00 0.85 0.05" width="1.18" height="1.50" material="opacity: 0; transparent: true"></a-plane>
      <a-plane class="clickable hotspot" data-video="video-creativite" position="1.36 0.77 0.05" width="1.18" height="1.50" material="opacity: 0; transparent: true"></a-plane>
      <a-plane class="clickable hotspot" data-video="video-developpement" position="2.72 0.62 0.05" width="1.18" height="1.52" material="opacity: 0; transparent: true"></a-plane>

      <a-plane class="clickable hotspot" data-video="video-cuisine" position="-1.76 -1.06 0.05" width="1.18" height="1.50" material="opacity: 0; transparent: true"></a-plane>
      <a-plane class="clickable hotspot" data-video="video-culture" position="1.95 -1.06 0.05" width="1.18" height="1.50" material="opacity: 0; transparent: true"></a-plane>

      <a-plane id="startButton" class="clickable" position="0 -0.82 0.06" width="1.55" height="0.42" material="opacity: 0; transparent: true"></a-plane>
      <a-plane id="backStartButton" class="clickable" position="3.62 2.18 0.06" width="1.35" height="0.35" material="opacity: 0; transparent: true"></a-plane>

    </a-entity>

    <a-entity id="videoUI" visible="false">
      <a-entity id="backButton" class="clickable" position="0 2.8 -3">
        <a-plane width="2.55" height="0.62" color="#05070d" opacity="0.88" material="shader: flat; transparent: true"></a-plane>
        <a-plane width="2.65" height="0.72" position="0 0 -0.01" color="#a855f7" opacity="0.22" material="shader: flat; transparent: true"></a-plane>
        <a-text value="Retour au Hub" align="center" position="0 0 0.04" color="#ffffff" width="4"></a-text>
      </a-entity>
    </a-entity>

  </a-scene>

  <script src="app.js"></script>
</body>
</html>
