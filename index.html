<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UniPop VR Hub</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
  <a-scene
    vr-mode-ui="enabled: true"
    renderer="antialias: true; colorManagement: true"
    background="color: #000814"
  >

    <a-assets timeout="30000">
      <img id="hub-bg" src="assets/hub.jpg" />

      <video id="video-langues" src="videos/langues.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-ia" src="videos/ia.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-creativite" src="videos/creativite.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-bienetre" src="videos/bien-etre.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
      <video id="video-cuisine" src="videos/cuisine.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
    </a-assets>

    <a-sky id="videoSky" color="#000814"></a-sky>

    <a-camera position="0 1.6 0" look-controls wasd-controls="enabled: false">
      <a-cursor
        fuse="true"
        fuse-timeout="900"
        color="#ffffff"
        raycaster="objects: .clickable"
        geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.024"
        material="color: #ffffff; shader: flat"
      ></a-cursor>
    </a-camera>

    <a-entity id="hub" position="0 1.6 -4.2">

      <a-plane
        src="#hub-bg"
        width="7.8"
        height="4.3875"
        position="0 0 0"
        material="shader: flat"
      ></a-plane>

      <!-- Unsichtbare Klickzonen über den 5 Kugeln -->
      <a-circle class="clickable hotspot" data-video="video-langues" position="-2.9 -0.65 0.04" radius="0.58" material="opacity: 0; transparent: true"></a-circle>
      <a-circle class="clickable hotspot" data-video="video-ia" position="-1.45 -0.65 0.04" radius="0.58" material="opacity: 0; transparent: true"></a-circle>
      <a-circle class="clickable hotspot" data-video="video-creativite" position="0 -0.65 0.04" radius="0.58" material="opacity: 0; transparent: true"></a-circle>
      <a-circle class="clickable hotspot" data-video="video-bienetre" position="1.45 -0.65 0.04" radius="0.58" material="opacity: 0; transparent: true"></a-circle>
      <a-circle class="clickable hotspot" data-video="video-cuisine" position="2.9 -0.65 0.04" radius="0.58" material="opacity: 0; transparent: true"></a-circle>

    </a-entity>

    <a-entity id="videoUI" visible="false">
      <a-entity id="backButton" class="clickable" position="0 2.75 -3">
        <a-plane width="2.5" height="0.6" color="#000000" opacity="0.78" material="shader: flat; transparent: true"></a-plane>
        <a-text value="Retour au Hub" align="center" position="0 0 0.04" color="#ffffff" width="4"></a-text>
      </a-entity>
    </a-entity>

  </a-scene>

  <script src="app.js"></script>
</body>
</html>
